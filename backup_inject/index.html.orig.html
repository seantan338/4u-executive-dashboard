<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>4U Command Center | 首席执行官战情室</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020617; --s1:#0f172a; --s2:#1e293b; --border:#334155;
  --accent:#f97316; --text:#f8fafc; --text2:#94a3b8; --success:#22c55e;
  --r:20px; --glow:rgba(249,115,22,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Outfit', sans-serif; overflow-x:hidden; }

/* 背景动态光晕 */
.bg-glow { position:fixed; inset:0; z-index:0; pointer-events:none; }
.orb { position:absolute; width:600px; height:600px; border-radius:50%; background:var(--accent); filter:blur(120px); opacity:0.08; top:-150px; right:-100px; animation: drift 20s infinite alternate; }
@keyframes drift { from { transform: translate(0,0); } to { transform: translate(-100px, 50px); } }

.wrap { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:60px 20px; }

/* Header */
.header { text-align:center; margin-bottom:60px; }
.badge { display:inline-block; padding:6px 16px; background:var(--s2); border:1px solid var(--border); border-radius:30px; font-size:11px; font-weight:800; color:var(--accent); margin-bottom:20px; letter-spacing:2px; text-transform:uppercase; }
.header h1 { font-size:clamp(32px, 5vw, 48px); font-weight:800; letter-spacing:-2px; margin-bottom:12px; }
.header h1 span { color: var(--accent); }
.header p { color:var(--text2); font-size:18px; font-weight:300; }

/* Section Logic */
.section-label { font-size:12px; font-weight:700; color:var(--accent); letter-spacing:3px; text-transform:uppercase; margin:40px 0 20px 4px; display:flex; align-items:center; gap:10px; }
.section-label::after { content:''; height:1px; flex:1; background: linear-gradient(to right, var(--border), transparent); }

/* Grid & Cards */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; }
.card { background:var(--s1); border:1px solid var(--border); border-radius:var(--r); padding:30px; text-decoration:none; color:inherit; transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position:relative; overflow:hidden; display:flex; flex-direction:column; }
.card:hover { border-color:var(--accent); transform:translateY(-8px); box-shadow:0 25px 50px -12px rgba(0,0,0,0.5), 0 0 15px var(--glow); }
.card-tag { position:absolute; top:20px; right:20px; font-size:10px; font-weight:800; padding:4px 10px; border-radius:8px; background:rgba(249,115,22,0.1); color:var(--accent); border:1px solid rgba(249,115,22,0.2); text-transform:uppercase; }
.card-icon { font-size:40px; margin-bottom:15px; }
.card-title { font-size:19px; font-weight:700; color:var(--text); margin-bottom:8px; }
.card-desc { font-size:14px; color:var(--text2); line-height:1.6; flex-grow:1; }
.card-arrow { margin-top:20px; font-size:18px; color:var(--accent); align-self:flex-end; transition:transform 0.3s; }
.card:hover .card-arrow { transform:translateX(5px); }

.footer { text-align:center; margin-top:80px; padding-top:40px; border-top:1px solid var(--border); color:var(--text2); font-size:12px; opacity:0.5; letter-spacing:1px; }

/* 语言切换 */
.lang-btn { position:absolute; top:20px; right:20px; background:var(--s2); border:1px solid var(--border); color:var(--text); padding:8px 15px; border-radius:12px; cursor:pointer; font-weight:600; font-size:13px; }

@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .wrap { padding:40px 15px; } }
</style>
</head>
<body>
<div class="bg-glow"><div class="orb"></div></div>

<button class="lang-btn" onclick="toggleLang()">EN / 中文</button>

<div class="wrap">
  <div class="header">
    <div class="badge">Privileged Access Only</div>
    <h1 id="main-title">4U <span>Command Center</span></h1>
    <p id="main-sub">全渠道人才数据引擎 · 核心指挥部</p>
  </div>

  <div id="portal-root"></div>

  <div class="footer">
    © 2026 Sunrise Recruit · Secure Terminal · Agensi Pekerjaan Sunrise Recruit Sdn Bhd
  </div>
</div>

<script>
// ==========================================
// 🚀 核心配置字典：你所有的功能都在这里
// ==========================================
const CONFIG = [
  {
    label: { zh: "📊 核心战情大屏", en: "📊 Strategic Dashboards" },
    items: [
      {
        url: "sunrise_4u_dashboard.html", icon: "📈", tag: "V1 Static",
        title: { zh: "ATS 架构分布图", en: "ATS Architecture Map" },
        desc: { zh: "查看 4U 平台全量代码模块分布及系统健康度初探。", en: "Initial architectural layout and system health analysis." }
      },
      {
        url: "frontend/4u-platform-executive-dashboard.html", icon: "🔥", tag: "Live Sync",
        title: { zh: "4U 动态战情大屏", en: "4U Live Command Dashboard" },
        desc: { zh: "实时连接 Firebase，自动呈现 n8n 工作流的真实完成进度。", en: "Real-time sync with Firebase to track automated workflow progress." }
      },
      {
        url: "frontend/sunrise-n8n-workflow-master-plan.html", icon: "⚡", tag: "Controller",
        title: { zh: "n8n 自动化总蓝图", en: "n8n Master Controller" },
        desc: { zh: "自动化节点的管理中枢。在此同步数据至战情大屏。", en: "Central node management. Sync progress to the executive suite." }
      }
    ]
  },
  {
    label: { zh: "🤖 AI 生产力工具", en: "🤖 AI Productivity" },
    items: [
      { url: "jd-generator.html", icon: "📋", tag: "AI", title: { zh: "JD 自动生成器", en: "JD Generator" }, desc: { zh: "输入职位，AI 自动生成专业中英文 JD。", en: "Generate professional bilingual JDs instantly." } },
      { url: "cv-screener.html", icon: "📄", tag: "AI", title: { zh: "CV 智能筛选", en: "CV Screener" }, desc: { zh: "上传简历，对照职位要求给出 AI 匹配分。", en: "Score candidate CVs against job requirements using AI." } }
    ]
  },
  {
    label: { zh: "⚙️ 运营与内部管理", en: "⚙️ Ops & Admin" },
    items: [
      { url: "whatsapp-templates.html", icon: "💬", tag: "Local", title: { zh: "WA 模板库", en: "WA Templates" }, desc: { zh: "一键复制常用消息模板。", en: "One-tap copy for recurrent messaging." } },
      { url: "candidate-tracker.html", icon: "👥", tag: "Track", title: { zh: "候选人追踪", en: "Candidate Tracker" }, desc: { zh: "管理招聘流水线状态。", en: "Manage candidate pipeline stages." } },
      { url: "quotation.html", icon: "💰", tag: "Finance", title: { zh: "报价单生成器", en: "Quotation Gen" }, desc: { zh: "快速生成专业 PDF 报价。", en: "Generate professional PDF quotes." } }
    ]
  }
];

let lang = localStorage.getItem('sr_lang') || 'zh';

function render() {
  const root = document.getElementById('portal-root');
  document.getElementById('main-title').innerHTML = lang === 'zh' ? '4U <span>Command Center</span>' : '4U <span>Command Center</span>';
  document.getElementById('main-sub').innerText = lang === 'zh' ? '全渠道人才数据引擎 · 核心指挥部' : 'Omnichannel ATS Engine · Executive Suite';
  
  let html = '';
  CONFIG.forEach(section => {
    html += `<div class="section-label">${section.label[lang]}</div><div class="grid">`;
    section.items.forEach(item => {
      html += `
        <a href="${item.url}" class="card">
          <span class="card-tag">${item.tag}</span>
          <span class="card-icon">${item.icon}</span>
          <div class="card-title">${item.title[lang]}</div>
          <div class="card-desc">${item.desc[lang]}</div>
          <div class="card-arrow">→</div>
        </a>
      `;
    });
    html += `</div>`;
  });
  root.innerHTML = html;
}

function toggleLang() {
  lang = (lang === 'zh') ? 'en' : 'zh';
  localStorage.setItem('sr_lang', lang);
  render();
}

render();
</script>
</body>
</html>
