<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d14">
<title>Sunrise Recruit — 内部工具</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d14; --s1:#14141f; --s2:#1c1c2e; --s3:#242438;
  --border:#2e2e48; --accent:#f97316; --accent2:#fb923c;
  --glow:rgba(249,115,22,0.18); --success:#22c55e; --warn:#eab308;
  --danger:#ef4444; --info:#3b82f6;
  --text:#f0f0f8; --text2:#9494b0; --text3:#5a5a7a;
  --r:16px; --r-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
body{overflow-x:hidden}

.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12}
.orb1{width:600px;height:600px;background:var(--accent);top:-200px;right:-100px;animation:drift1 18s ease-in-out infinite}
.orb2{width:400px;height:400px;background:#6366f1;bottom:-100px;left:-100px;animation:drift2 22s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,40px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 20px 60px}
.header{text-align:center;padding:40px 0 48px;animation:fadeUp 0.6s ease both;position:relative}
.logo-badge{display:inline-flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:40px;padding:8px 18px;margin-bottom:20px;cursor:pointer}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.logo-text{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:0.5px}
.header h1{font-size:clamp(28px,6vw,42px);font-weight:800;letter-spacing:-1px;line-height:1.1}
.header h1 span{background:linear-gradient(135deg,var(--accent),#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text2);font-size:15px;margin-top:12px}
.header-sub{color:var(--text3);font-size:13px;margin-top:6px}

.api-bar{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 16px;margin-bottom:32px}
.api-status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.api-dot{width:8px;height:8px;border-radius:50%;background:var(--danger)}
.api-dot.ok{background:var(--success)}
.api-btn{padding:6px 14px;background:var(--accent);border:none;border-radius:20px;color:#fff;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity 0.2s}
.api-btn:hover{opacity:0.85}

.section-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:14px;padding-left:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:36px}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;text-decoration:none;display:block;animation:fadeUp 0.5s ease both}
.card::before{content:'';position:absolute;inset:0;background:var(--glow);opacity:0;transition:opacity 0.25s;pointer-events:none}
.card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.card:hover::before{opacity:1}
.card-icon{font-size:32px;margin-bottom:12px;display:block}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px}
.card-desc{font-size:12px;color:var(--text2);line-height:1.6}
.card-badge{position:absolute;top:14px;right:14px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.card-arrow{position:absolute;bottom:16px;right:16px;color:var(--text3);font-size:18px;transition:transform 0.2s,color 0.2s}
.card:hover .card-arrow{transform:translate(3px,-3px);color:var(--accent)}

.footer{text-align:center;padding-top:20px;color:var(--text3);font-size:12px;border-top:1px solid var(--border)}

/* Modal Styles preserved */
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal h3{font-size:16px;font-weight:700}
.modal p{font-size:13px;color:var(--text2);line-height:1.6}
.provider-tabs{display:flex;gap:8px;flex-wrap:wrap}
.ptab{padding:8px 14px;border-radius:30px;border:1px solid var(--border);background:var(--s2);color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.ptab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-group label{font-size:12px;color:var(--text2);font-weight:500}
.input-group input,.input-group select{padding:10px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;width:100%}
.input-group input:focus,.input-group select:focus{border-color:var(--accent)}
select option{background:var(--s2)}
.modal-actions{display:flex;gap:8px}
.btn{padding:10px 18px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;flex:1;justify-content:center}
.btn-secondary{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.key-status{font-size:11px;margin-top:4px}
.key-ok{color:var(--success)}
.key-missing{color:var(--warn)}
.docs-link{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline;margin-top:-4px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.lang-toggle-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--s2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.lang-toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="wrap">
  <div class="header">
    <div class="logo-badge" onclick="adminTap()" title="Tap 5 times for Admin">
      <div class="logo-dot"></div>
      <span class="logo-text">SUNRISE RECRUIT · INTERNAL TOOLS</span>
    </div>
    <div style="position:absolute;top:20px;right:20px;display:flex;gap:8px;align-items:center">
      <button class="lang-toggle-btn" id="lang-toggle-btn" onclick="toggleLang()">
        <span class="flag" id="lang-flag">🇬🇧</span>
        <span id="lang-label">EN</span>
      </button>
      <button onclick="logout()" style="padding:6px 14px;background:var(--s2);border:1px solid var(--border);border-radius:20px;color:var(--text3);font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.2s" onmouseover="this.style.borderColor='var(--danger)';this.style.color='var(--danger)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text3)'"><span data-zh="🚪 登出" data-en="🚪 Logout">🚪 登出</span></button>

function renderPortal() {
  const root = document.getElementById('dynamic-portal-root');
  let html = '';

  PORTAL_CONFIG.forEach((section, index) => {
    // Section Label
    html += `<div class="section-label" data-zh="${section.titleZh}" data-en="${section.titleEn}">${currentLang === 'zh' ? section.titleZh : section.titleEn}</div>`;
    
    // Grid Container
    html += `<div class="grid">`;
    
    // Cards
    section.items.forEach((item, itemIdx) => {
      // 动态生成样式
      let cardStyle = '';
      if (section.id === 'dashboards') {
         if (itemIdx === 0) cardStyle = `border-color: rgba(249,115,22,0.5); box-shadow: 0 4px 20px rgba(249,115,22,0.05);`;
         if (itemIdx === 1) cardStyle = `border-color: rgba(59,139,212,0.5); box-shadow: 0 4px 20px rgba(59,139,212,0.05);`;
      }

      html += `
        <a class="card" href="${item.url}" style="${cardStyle}" ${item.url.startsWith('http') ? 'target="_blank"' : ''}>
          <span class="card-icon">${item.icon}</span>
          <div class="card-title" data-zh="${item.titleZh}" data-en="${item.titleEn}">${currentLang === 'zh' ? item.titleZh : item.titleEn}</div>
          <div class="card-desc" data-zh="${item.descZh}" data-en="${item.descEn}">${currentLang === 'zh' ? item.descZh : item.descEn}</div>
          <span class="card-badge" style="background:${item.badgeColor};color:${item.badgeTextColor};border:1px solid ${item.badgeBorder}" data-zh="${item.badgeLabel}" data-en="${item.badgeLabel}">${item.badgeLabel}</span>
          <span class="card-arrow">↗</span>
        </a>
      `;
    });
    
    html += `</div>`;
  });

  root.innerHTML = html;
}

let curProvider = localStorage.getItem('sr_provider')||'anthropic';

const ADMIN_PW = 'sunrise2025';
let adminTapCount = 0;
let adminTapTimer = null;
let isAdmin = sessionStorage.getItem('sr_admin') === '1';

function adminTap() {
  adminTapCount++;
  clearTimeout(adminTapTimer);
  adminTapTimer = setTimeout(() => { adminTapCount = 0; }, 2000);
  if (adminTapCount >= 5) {
    adminTapCount = 0;
    if (isAdmin) { openModal(); } else { promptAdmin(); }
  }
}

function promptAdmin() {
  const pw = prompt(currentLang === 'zh' ? '请输入管理员密码：' : 'Enter admin password:');
  if (pw === ADMIN_PW) {
    isAdmin = true;
    sessionStorage.setItem('sr_admin', '1');
    document.getElementById('admin-settings-btn').style.display = 'block';
    openModal();
  } else if (pw !== null) {
    alert(currentLang === 'zh' ? '密码错误' : 'Wrong password');
  }
}

function checkAdminSession() {
  if (isAdmin) { document.getElementById('admin-settings-btn').style.display = 'block'; }
}

let currentLang = localStorage.getItem('sr_lang') || 'en';

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('sr_lang', lang);
  
  // Update static elements
  document.querySelectorAll('[data-zh][data-en]').forEach(el => {
    el.innerHTML = el.dataset[lang] || el.innerHTML;
  });
  
  // Update dynamic portal
  renderPortal();

  const btn = document.getElementById('lang-toggle-btn');
  if (btn) {
    document.getElementById('lang-flag').textContent = lang === 'zh' ? '🇬🇧' : '🇨🇳';
    document.getElementById('lang-label').textContent = lang === 'zh' ? 'EN' : '中文';
  }
  document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
}

function toggleLang() { applyLang(currentLang === 'zh' ? 'en' : 'zh'); }

const PROXY_URL_KEY = 'sr_proxy_url';
function getProxyUrl(){return localStorage.getItem(PROXY_URL_KEY)||'';}
function getKey(p){return localStorage.getItem(`sr_key_${p||curProvider}`)||'';}
function getModel(){return localStorage.getItem('sr_model')||PROVIDERS[curProvider].models[0].v;}

function updateApiBar(){
  const k=getKey();
  const dot=document.getElementById('api-dot');
  const label=document.getElementById('api-label');
  const pu=localStorage.getItem('sr_proxy_url')||'';
  if(pu){
    dot.className='api-dot ok';
    label.textContent=currentLang==='zh'?'🔒 Proxy 模式 — API Key 安全存储在服务器':'🔒 Proxy Mode — API Key secured on server';
  } else if(k){
    dot.className='api-dot ok';
    label.textContent=currentLang==='zh'?`✅ ${PROVIDERS[curProvider].name} 已配置`:`✅ ${PROVIDERS[curProvider].name} Configured`;
  } else {
    dot.className='api-dot';
    label.textContent='⚠️ AI 未配置 · Not Configured — 点击设置';
  }
}

function openModal(){
  curProvider=localStorage.getItem('sr_provider')||'anthropic';
  renderModal();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function renderModal(){
  document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b.dataset.p===curProvider));
  const p=PROVIDERS[curProvider];
  document.getElementById('key-input').placeholder=p.placeholder;
  document.getElementById('key-input').value=getKey(curProvider);
  document.getElementById('key-label').textContent=`${p.name} API Key`;
  const sel=document.getElementById('model-select');
  sel.innerHTML=p.models.map(m=>`<option value="${m.v}"${m.v===getModel()?' selected':''}>${m.l}</option>`).join('');
  const k=getKey(curProvider);
  document.getElementById('key-status').innerHTML=k?`<span class="key-ok">✅ 已配置</span>`:`<span class="key-missing">⚠️ 未设置</span>`;
  document.getElementById('docs-link').textContent=p.docsLabel;
  const pu=getProxyUrl();
  document.getElementById('proxy-input').value=pu;
  document.getElementById('proxy-status').innerHTML=pu
    ?'<span style="color:var(--success)">✅ Proxy 已配置，Key 安全存储在服务器</span>'
    :'<span style="color:var(--text3)">未配置 — staff 需各自填 API Key</span>';
  document.getElementById('docs-link').onclick=()=>window.open(p.docs,'_blank');
}

document.querySelectorAll('.ptab').forEach(btn=>{
  btn.addEventListener('click',()=>{curProvider=btn.dataset.p;renderModal();});
});

function saveSettings(){
  const k=document.getElementById('key-input').value.trim();
  if(k)localStorage.setItem(`sr_key_${curProvider}`,k);
  localStorage.setItem('sr_provider',curProvider);
  localStorage.setItem('sr_model',document.getElementById('model-select').value);
  const pu=document.getElementById('proxy-input').value.trim();
  if(pu)localStorage.setItem('sr_proxy_url',pu.replace(/\/$/,''));
  else localStorage.removeItem('sr_proxy_url');
  closeModal();updateApiBar();
  showToast('✅ 设置已保存 Settings saved');
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c1c2e;color:#f0f0f8;padding:10px 20px;border-radius:40px;font-size:13px;z-index:200;opacity:0;transition:all 0.3s;border:1px solid #2e2e48;white-space:nowrap;font-family:Outfit,sans-serif';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},2500);
}

// 初始执行
updateApiBar();
applyLang(currentLang);
checkAdminSession();
